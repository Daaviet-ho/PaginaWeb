<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Trabaja Conmigo - Únete a DreamsDeveloper y empecemos a crear juntos">
    <title>Trabaja Conmigo | DreamsDeveloper</title>
    <link rel="icon" type="image/png" href="img/icono.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-side auth-side-register">
            <a href="index.html" class="auth-brand">
                <img src="img/icono.png" alt="DreamsDeveloper Logo">
                <span>DreamsDeveloper</span>
            </a>
            <h2>Empecemos a crear juntos</h2>
            <p>Regístrate para acceder a tu espacio, seguir tus proyectos y comunicarte directamente conmigo.</p>
        </div>
        <div class="auth-main">
            <div class="auth-card">
                <h1 class="auth-title">Trabaja Conmigo</h1>
                <p class="auth-subtitle">Crea tu cuenta y empecemos</p>
                <form class="auth-form" action="#" method="POST">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nombre">Nombre</label>
                            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
                        </div>
                        <div class="form-group">
                            <label for="apellido">Apellido</label>
                            <input type="text" id="apellido" name="apellido" placeholder="Tu apellido" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                    </div>
                    <div class="form-group">
                        <label for="telefono">Teléfono</label>
                        <input type="tel" id="telefono" name="telefono" placeholder="+34 600 000 000">
                    </div>
                    <div class="form-group">
                        <label for="sector">¿En qué sector trabajas?</label>
                        <select id="sector" name="sector">
                            <option value="">Selecciona un sector</option>
                            <option value="turismo">Turismo y ocio</option>
                            <option value="restauracion">Restauración</option>
                            <option value="comercio">Comercio (retail)</option>
                            <option value="transporte">Transporte y movilidad</option>
                            <option value="construccion">Construcción e inmobiliaria</option>
                            <option value="profesionales">Servicios profesionales</option>
                            <option value="tecnologia">Tecnología y marketing</option>
                            <option value="musica">Industria musical y entretenimiento</option>
                            <option value="bienestar">Bienestar y lifestyle</option>
                            <option value="agricultura">Agricultura y productos locales</option>
                            <option value="salud">Salud</option>
                            <option value="educacion">Educación</option>
                            <option value="personales">Servicios personales</option>
                            <option value="logistica">Industria y logística</option>
                            <option value="otro">Otro</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required minlength="8">
                    </div>
                    <div class="form-group">
                        <label for="password2">Confirmar contraseña</label>
                        <input type="password" id="password2" name="password2" placeholder="Repite tu contraseña" required minlength="8">
                    </div>
                    <label class="checkbox-label">
                        <input type="checkbox" name="terms" required> Acepto los términos y condiciones
                    </label>
                    <button type="submit" class="btn btn-primary btn-full">Crear cuenta</button>
                </form>
                <div class="auth-separator">
                    <span>o</span>
                </div>
                <p class="auth-switch">¿Ya tienes cuenta? <a href="login.html">Identifícate</a></p>
            </div>
        </div>
    </div>
</body>
</html>
